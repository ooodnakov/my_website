<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счетчик нажатий в реальном времени</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 350px;
        }
        .btn-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            background-color: #ff3333;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 20px;
            font-size: 24px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-grow: 1;
        }
        .btn:hover {
            background-color: #cc0000;
        }
        .counter {
            background-color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
        }
        .minus-btn {
            background-color: #888;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-size: 20px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .minus-btn:hover {
            background-color: #666;
        }
        .online-count {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
        }
        /* Анимация при изменении счетчика */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .pulse {
            animation: pulse 0.3s;
        }
    </style>
</head>
<body>
    <h1>Счетчик нажатий в реальном времени</h1>
    <div class="button-container">
        <div class="btn-group">
            <button class="btn" data-name="lenya">
                Леня
                <span id="lenya-counter" class="counter">0</span>
            </button>
            <button class="minus-btn" data-name="lenya">-</button>
        </div>
        
        <div class="btn-group">
            <button class="btn" data-name="sasha">
                Саша
                <span id="sasha-counter" class="counter">0</span>
            </button>
            <button class="minus-btn" data-name="sasha">-</button>
        </div>
        
        <div class="btn-group">
            <button class="btn" data-name="lyuba">
                Люба
                <span id="lyuba-counter" class="counter">0</span>
            </button>
            <button class="minus-btn" data-name="lyuba">-</button>
        </div>
    </div>
    
    <div class="online-count">Онлайн: <span id="online-counter">1</span></div>

    <audio id="increment-sound" preload="auto">
        <source src="data:audio/mpeg;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAAFAAAGhgCFhYWFhYWFhYWFhYWFhYWFhYWFra2tra2tra2tra2tra2tra2traOjo6Ojo6Ojo6Ojo6Ojo6Ojo6P///////////////////8AAAA8TEFNRTMuOTlyAc0AAAAAAAAAABSAJAJAQgAAgAAAA+aivWKPAAAAAAAAAAAAAAAAAAAA//sQxAADwAABpAAAACAAADSAAAAEJshmwEP2AQV2NyIcThQJGHBDOAwYAODpAQ4IACAIB4/4PBAMBg/+DwQDCB/oCAYDA/4fB/+DwQAB//BAMBAMf//Bwfgg//4IAgIfgQBCfY4FQQOBgQAEP/7EsQJg8AAAaQAAAAgAAA0gAAABBDA41QExS4cJFGbMHCZQkJiQw8JkZkhAw8NsxgjGJCIEpnAuYoLhaQqXGOxZv5jIGIQoLAgCHygSAwy4YLFwxlMRgwSMRlYA2pZRcUigUYMCCzBQJFxQ//sSxCsDwAABpAAAACAAADSAAAAEBAw4JkxjbHGZJTTNRVDWQSETBBgwSBTFvHjBgAMoOmCQIYaE5j8Ol6RIpjx8GCAoSAKYOBi4w4EAAYA6YJA4aQCkRA8wwFT6KZgSCmJASYGAYAA=">
    </audio>
    <audio id="decrement-sound" preload="auto">
        <source src="data:audio/mpeg;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAAFAAAGhgCFhYWFhYWFhYWFhYWFhYWFhYWFra2tra2tra2tra2tra2tra2traOjo6Ojo6Ojo6Ojo6Ojo6Ojo6P///////////////////8AAAA8TEFNRTMuOTlyAc0AAAAAAAAAABSAJAJAQgAAgAAAA+aivWKPAAAAAAAAAAAAAAAAAAAA//sQxAADwAABpAAAACAAADSAAAAEG/4IBhA/xwfB+D4P///ggGAgGP//wfggAH//BAIEAQP//wfBAEBD//BAMBAMf//BwQAB//BNjYpgQKggcDAgYCAcJhCQbGEISowWDDEYbMLjFo4tMEEwwGGTy4Y//sSxAqDwAABpAAAACAAADSAAAAEMwRAwUBhxlDEQdMEgcw0GQdGJAUYWBRhYLGCAIYHAJigBGEAGJAPMGAAuYJg0CgeKgKMHAEwQATAwKDoJCoEzDACBQOMKAswMATAwBMCgExlHzMEP//sQxBuDwAABpAAAACAAADSAAAAEMFgMwYATAgEJgEMBAMJAADAQEAxpXDJQ4Mg3MhUoxWPhQBhgCBgKBQEAQMAQMBAMAgDJg8AGAgCYDApgoLmBQCYVFImKpj4hCgUAgEOoEOw=">
    </audio>

    <script>
        // Эмуляция серверной части с Socket.IO прямо в браузере
        // В реальном приложении вам понадобится сервер Node.js с Socket.IO
        
        // Создаем простую эмуляцию Socket.IO для демонстрации
        class SocketEmulator {
            constructor() {
                this.subscribers = [];
                this.counters = {
                    lenya: 0,
                    sasha: 0,
                    lyuba: 0
                };
                this.onlineUsers = 1;
            }
            
            on(event, callback) {
                this.subscribers.push({ event, callback });
            }
            
            emit(event, data) {
                // Имитируем небольшую сетевую задержку
                setTimeout(() => {
                    if (event === 'increment') {
                        this.counters[data.name]++;
                        this.broadcast('updateCounter', { 
                            name: data.name, 
                            value: this.counters[data.name] 
                        });
                    } else if (event === 'decrement') {
                        if (this.counters[data.name] > 0) {
                            this.counters[data.name]--;
                            this.broadcast('updateCounter', { 
                                name: data.name, 
                                value: this.counters[data.name] 
                            });
                        }
                    } else if (event === 'userConnected') {
                        this.onlineUsers++;
                        this.broadcast('updateOnlineUsers', { count: this.onlineUsers });
                    }
                }, 50);
            }
            
            broadcast(event, data) {
                this.subscribers.forEach(subscriber => {
                    if (subscriber.event === event) {
                        subscriber.callback(data);
                    }
                });
            }
        }
        
        // Инициализация эмулятора Socket.IO
        const socket = new SocketEmulator();
        
        // Инициализация звуков
        const incrementSound = document.getElementById('increment-sound');
        const decrementSound = document.getElementById('decrement-sound');
        
        // Обработчики событий для кнопок
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', () => {
                const name = button.getAttribute('data-name');
                socket.emit('increment', { name });
            });
        });
        
        document.querySelectorAll('.minus-btn').forEach(button => {
            button.addEventListener('click', () => {
                const name = button.getAttribute('data-name');
                socket.emit('decrement', { name });
            });
        });
        
        // Обновление счетчиков при получении данных
        socket.on('updateCounter', data => {
            const counterElement = document.getElementById(`${data.name}-counter`);
            counterElement.textContent = data.value;
            
            // Добавляем эффект пульсации при обновлении
            counterElement.classList.add('pulse');
            setTimeout(() => {
                counterElement.classList.remove('pulse');
            }, 300);
            
            // Проигрываем звук
            if (data.value > parseInt(counterElement.textContent)) {
                incrementSound.currentTime = 0;
                incrementSound.play();
            } else {
                decrementSound.currentTime = 0;
                decrementSound.play();
            }
        });
        
        socket.on('updateOnlineUsers', data => {
            document.getElementById('online-counter').textContent = data.count;
        });
        
        // Имитация подключения пользователя
        function simulateUserConnection() {
            if (Math.random() > 0.5) {
                socket.emit('userConnected');
                
                // Имитация случайных кликов
                setTimeout(() => {
                    const names = ['lenya', 'sasha', 'lyuba'];
                    const randomName = names[Math.floor(Math.random() * names.length)];
                    const isIncrement = Math.random() > 0.3;
                    
                    if (isIncrement) {
                        socket.emit('increment', { name: randomName });
                    } else {
                        socket.emit('decrement', { name: randomName });
                    }
                }, Math.random() * 3000 + 1000);
            }
            
            // Периодически вызываем эту функцию
            setTimeout(simulateUserConnection, Math.random() * 5000 + 2000);
        }
        
        // Запускаем имитацию других пользователей
        setTimeout(simulateUserConnection, 3000);
        
        // Для проверки работы звуков при загрузке страницы
        document.addEventListener('click', function initAudio() {
            incrementSound.volume = 0.3;
            decrementSound.volume = 0.3;
            incrementSound.play().then(() => {
                incrementSound.pause();
                incrementSound.currentTime = 0;
            }).catch(e => console.log("Звук не может воспроизвестись автоматически. Это нормально."));
            document.removeEventListener('click', initAudio);
        });
    </script>
</body>
</html>
